<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0c0e" />
    <meta name="color-scheme" content="dark light" />
    <meta name="description" content="Road to the World Cup Final 2026 — live scores, bracket paths, venue hubs, and tournament intelligence." />
    <meta property="og:title" content="Road to the World Cup Final 2026" />
    <meta property="og:description" content="Live scores, qualification tracking, venue hubs, and tournament simulator for FIFA World Cup 2026™." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/og-image.png" type="image/png" />
    <title>Road to the World Cup Final 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("wc-color-scheme") || "system";
          var theme =
            pref === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : pref;
          document.documentElement.dataset.theme = theme;
          document.documentElement.dataset.themePref = pref;
          document.documentElement.style.colorScheme = theme;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", theme === "light" ? "#e8ece9" : "#0a0c0e");
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
